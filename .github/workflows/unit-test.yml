name: Phosphor Health Monitor CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          meson \
          ninja-build \
          pkg-config \
          gcc \
          g++ \
          lcov \
          libgtest-dev \
          libgmock-dev \
          libsystemd-dev \
          libboost-all-dev

    - name: Show Tool Versions
      run: |
        gcc --version
        g++ --version
        meson --version
        ninja --version

    - name: Configure
      run: |
        meson setup builddir

    - name: Build
      run: |
        ninja -C builddir

    - name: Run Unit Tests
      run: |
        meson test -C builddir --print-errorlogs

    - name: Generate Coverage
      run: |
        ninja -C builddir coverage || true

        if [ -f builddir/meson-logs/coveragereport/index.html ]; then
          cp -r builddir/meson-logs/coveragereport coverage-html
        fi

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: coverage-html
        if-no-files-found: ignore

    - name: Upload Meson Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: meson-logs
        path: builddir/meson-logs
        if-no-files-found: ignore
