name: OpenBMC Official CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout OpenBMC Build Scripts
        uses: actions/checkout@v4
        with:
          repository: openbmc/openbmc-build-scripts
          path: openbmc-build-scripts

      - name: Install Python Requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          python3 -m pip install --upgrade pip
          pip3 install sh

      - name: Build Official Docker Image
        run: |
          cd openbmc-build-scripts
          ./scripts/build-unit-test-docker

      - name: Show Docker Images
        run: |
          docker images

      - name: Run Build/Test Inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            openbmc/ubuntu-unit-test:latest \
            bash -c "
              meson setup builddir &&
              ninja -C builddir &&
              meson test -C builddir --print-errorlogs || true
            "

      - name: Generate Coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            openbmc/ubuntu-unit-test:latest \
            bash -c "
              lcov --capture \
                --directory builddir \
                --output-file coverage.info || true

              genhtml coverage.info \
                --output-directory coverage-html || true
            "

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html

      - name: Upload Coverage Info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
