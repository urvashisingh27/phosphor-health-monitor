name: OpenBMC Official CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout OpenBMC Build Scripts
        uses: actions/checkout@v4
        with:
          repository: openbmc/openbmc-build-scripts
          path: openbmc-build-scripts

      - name: Build Official Docker Image
        run: |
          cd openbmc-build-scripts
          chmod +x scripts/build-unit-test-docker
          ./scripts/build-unit-test-docker

      - name: Show Docker Images
        run: docker images

      - name: Run Build/Test Inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            $(docker images --format "{{.Repository}}:{{.Tag}}" | grep '^openbmc/ubuntu-unit-test:' | head -n1) \
            bash -c "
              meson setup builddir &&
              ninja -C builddir &&
              meson test -C builddir --print-errorlogs
            "

      - name: Generate Coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            $(docker images --format "{{.Repository}}:{{.Tag}}" | grep '^openbmc/ubuntu-unit-test:' | head -n1) \
            bash -c '
              lcov \
                --capture \
                --directory builddir \
                --output-file coverage.info \
                --ignore-errors mismatch

              genhtml \
                coverage.info \
                --output-directory coverage-html
            '

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html

      - name: Upload Coverage Info
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
